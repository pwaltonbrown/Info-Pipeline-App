# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

on:
  schedule:
    # Runs at minute 0 of every 6th hour (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger execution anytime from the UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Weather Pipeline
      env:
        WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
      run: python weather_pipeline.py

    - name: Commit and Push Updated Data File
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add weather_history.csv
        git commit -m "Automated update: Added fresh weather records" || echo "No changes to commit"
        git push
